<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f1117"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">Agentic SDK Stack — Where the Top 3 Packages Fit</text>

  <!-- Layer: LLM Provider -->
  <rect x="50" y="70" width="700" height="60" rx="10" fill="#1a1f2e" stroke="#3b4a6b" stroke-width="1.5"/>
  <text x="400" y="95" text-anchor="middle" fill="#8892b0" font-size="13" font-weight="bold">LLM PROVIDERS</text>
  <text x="400" y="118" text-anchor="middle" fill="#6272a4" font-size="12">OpenAI · Anthropic · Gemini · Mistral · Ollama</text>

  <!-- Layer: Agentic SDKs -->
  <rect x="50" y="150" width="700" height="60" rx="10" fill="#1a1f2e" stroke="#3b4a6b" stroke-width="1.5"/>
  <text x="400" y="175" text-anchor="middle" fill="#8892b0" font-size="13" font-weight="bold">AGENTIC SDKs</text>
  <text x="400" y="198" text-anchor="middle" fill="#6272a4" font-size="12">Claude Agent SDK · OpenAI Agents · LangGraph · CrewAI · AutoGen · LlamaIndex</text>

  <!-- Arrow down -->
  <line x1="400" y1="210" x2="400" y2="230" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Three package boxes -->
  <!-- Pydantic -->
  <rect x="60" y="240" width="200" height="170" rx="12" fill="#1e3a5f" stroke="#4299e1" stroke-width="2"/>
  <rect x="60" y="240" width="200" height="40" rx="12" fill="#2b6cb0"/>
  <rect x="60" y="268" width="200" height="12" fill="#2b6cb0"/>
  <text x="160" y="266" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">📦 pydantic</text>
  <text x="160" y="303" text-anchor="middle" fill="#90cdf4" font-size="11" font-weight="bold">STRUCTURED DATA</text>
  <text x="160" y="323" text-anchor="middle" fill="#bee3f8" font-size="11">Tool / Function Schemas</text>
  <text x="160" y="341" text-anchor="middle" fill="#bee3f8" font-size="11">Structured LLM Outputs</text>
  <text x="160" y="359" text-anchor="middle" fill="#bee3f8" font-size="11">Input / Output Validation</text>
  <text x="160" y="377" text-anchor="middle" fill="#bee3f8" font-size="11">Agent State Models</text>
  <text x="160" y="399" text-anchor="middle" fill="#63b3ed" font-size="10">Used by ALL SDKs</text>

  <!-- asyncio -->
  <rect x="300" y="240" width="200" height="170" rx="12" fill="#2d1b4e" stroke="#805ad5" stroke-width="2"/>
  <rect x="300" y="240" width="200" height="40" rx="12" fill="#553c9a"/>
  <rect x="300" y="268" width="200" height="12" fill="#553c9a"/>
  <text x="400" y="266" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">🐍 asyncio</text>
  <text x="400" y="303" text-anchor="middle" fill="#d6bcfa" font-size="11" font-weight="bold">CONCURRENCY ENGINE</text>
  <text x="400" y="323" text-anchor="middle" fill="#e9d8fd" font-size="11">Concurrent Tool Calls</text>
  <text x="400" y="341" text-anchor="middle" fill="#e9d8fd" font-size="11">Event Loop Control</text>
  <text x="400" y="359" text-anchor="middle" fill="#e9d8fd" font-size="11">Background Tasks</text>
  <text x="400" y="377" text-anchor="middle" fill="#e9d8fd" font-size="11">Agent Message Queues</text>
  <text x="400" y="399" text-anchor="middle" fill="#b794f4" font-size="10">Python stdlib — no install</text>

  <!-- tenacity -->
  <rect x="540" y="240" width="200" height="170" rx="12" fill="#3d1f1f" stroke="#fc8181" stroke-width="2"/>
  <rect x="540" y="240" width="200" height="40" rx="12" fill="#9b2c2c"/>
  <rect x="540" y="268" width="200" height="12" fill="#9b2c2c"/>
  <text x="640" y="266" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">📦 tenacity</text>
  <text x="640" y="303" text-anchor="middle" fill="#feb2b2" font-size="11" font-weight="bold">RETRY &amp; RESILIENCE</text>
  <text x="640" y="323" text-anchor="middle" fill="#fed7d7" font-size="11">Exponential Backoff</text>
  <text x="640" y="341" text-anchor="middle" fill="#fed7d7" font-size="11">Rate Limit Handling</text>
  <text x="640" y="359" text-anchor="middle" fill="#fed7d7" font-size="11">LLM Flakiness Guard</text>
  <text x="640" y="377" text-anchor="middle" fill="#fed7d7" font-size="11">Tool Call Retry Logic</text>
  <text x="640" y="399" text-anchor="middle" fill="#fc8181" font-size="10">Production must-have</text>

  <!-- Bottom: Tools / External -->
  <rect x="50" y="430" width="700" height="50" rx="10" fill="#1a1f2e" stroke="#3b4a6b" stroke-width="1.5"/>
  <text x="400" y="452" text-anchor="middle" fill="#8892b0" font-size="12" font-weight="bold">TOOLS / EXTERNAL SERVICES</text>
  <text x="400" y="470" text-anchor="middle" fill="#6272a4" font-size="11">REST APIs · Databases · Web Search · File Systems · MCP Servers</text>

  <!-- Arrows from packages to bottom -->
  <line x1="160" y1="410" x2="200" y2="430" stroke="#4299e1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="410" x2="400" y2="430" stroke="#805ad5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="640" y1="410" x2="600" y2="430" stroke="#fc8181" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
</svg>
