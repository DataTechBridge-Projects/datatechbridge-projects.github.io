<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="460" fill="#0f1117"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#b794f4" font-size="18" font-weight="bold">asyncio — The Concurrency Engine of Agentic SDKs</text>

  <!-- Event Loop box -->
  <rect x="290" y="58" width="220" height="52" rx="10" fill="#2d1b4e" stroke="#805ad5" stroke-width="2"/>
  <text x="400" y="81" text-anchor="middle" fill="#d6bcfa" font-size="13" font-weight="bold">Event Loop</text>
  <text x="400" y="99" text-anchor="middle" fill="#9f7aea" font-size="11">asyncio.get_event_loop()</text>

  <!-- Four coroutines -->
  <rect x="30" y="150" width="155" height="50" rx="8" fill="#1e1a3a" stroke="#805ad5" stroke-width="1.5"/>
  <text x="108" y="172" text-anchor="middle" fill="#d6bcfa" font-size="11" font-weight="bold">LLM Call</text>
  <text x="108" y="189" text-anchor="middle" fill="#9f7aea" font-size="10">await client.chat()</text>

  <rect x="210" y="150" width="155" height="50" rx="8" fill="#1e1a3a" stroke="#805ad5" stroke-width="1.5"/>
  <text x="288" y="172" text-anchor="middle" fill="#d6bcfa" font-size="11" font-weight="bold">Tool Call 1</text>
  <text x="288" y="189" text-anchor="middle" fill="#9f7aea" font-size="10">await search(query)</text>

  <rect x="390" y="150" width="155" height="50" rx="8" fill="#1e1a3a" stroke="#805ad5" stroke-width="1.5"/>
  <text x="468" y="172" text-anchor="middle" fill="#d6bcfa" font-size="11" font-weight="bold">Tool Call 2</text>
  <text x="468" y="189" text-anchor="middle" fill="#9f7aea" font-size="10">await fetch_data()</text>

  <rect x="570" y="150" width="155" height="50" rx="8" fill="#1e1a3a" stroke="#805ad5" stroke-width="1.5"/>
  <text x="648" y="172" text-anchor="middle" fill="#d6bcfa" font-size="11" font-weight="bold">Background Task</text>
  <text x="648" y="189" text-anchor="middle" fill="#9f7aea" font-size="10">asyncio.create_task()</text>

  <!-- Lines from event loop to coroutines -->
  <line x1="340" y1="110" x2="108" y2="150" stroke="#553c9a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="370" y1="110" x2="288" y2="150" stroke="#553c9a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="430" y1="110" x2="468" y2="150" stroke="#553c9a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="460" y1="110" x2="648" y2="150" stroke="#553c9a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- gather / create_task examples -->
  <rect x="30" y="230" width="370" height="100" rx="8" fill="#0d0a1a" stroke="#553c9a" stroke-width="1"/>
  <text x="45" y="250" fill="#b794f4" font-size="11" font-weight="bold">asyncio.gather — run tools concurrently</text>
  <text x="45" y="268" fill="#68d391" font-size="10" font-family="Consolas, monospace">results = await asyncio.gather(</text>
  <text x="45" y="284" fill="#90cdf4" font-size="10" font-family="Consolas, monospace">    search(query),</text>
  <text x="45" y="300" fill="#90cdf4" font-size="10" font-family="Consolas, monospace">    fetch_news(topic),</text>
  <text x="45" y="316" fill="#90cdf4" font-size="10" font-family="Consolas, monospace">    return_exceptions=True)</text>

  <rect x="420" y="230" width="355" height="100" rx="8" fill="#0d0a1a" stroke="#553c9a" stroke-width="1"/>
  <text x="435" y="250" fill="#b794f4" font-size="11" font-weight="bold">asyncio.create_task — fire and forget</text>
  <text x="435" y="268" fill="#68d391" font-size="10" font-family="Consolas, monospace">task = asyncio.create_task(</text>
  <text x="435" y="284" fill="#90cdf4" font-size="10" font-family="Consolas, monospace">    log_to_observability(state))</text>
  <text x="435" y="300" fill="#fbd38d" font-size="10" font-family="Consolas, monospace"># agent continues, task runs</text>
  <text x="435" y="316" fill="#fbd38d" font-size="10" font-family="Consolas, monospace"># in background</text>

  <!-- timeout + queue row -->
  <rect x="30" y="350" width="370" height="90" rx="8" fill="#0d0a1a" stroke="#553c9a" stroke-width="1"/>
  <text x="45" y="370" fill="#b794f4" font-size="11" font-weight="bold">asyncio.timeout — guard slow tools</text>
  <text x="45" y="388" fill="#68d391" font-size="10" font-family="Consolas, monospace">async with asyncio.timeout(10.0):</text>
  <text x="45" y="404" fill="#90cdf4" font-size="10" font-family="Consolas, monospace">    result = await slow_tool()</text>
  <text x="45" y="420" fill="#fc8181" font-size="10" font-family="Consolas, monospace"># raises TimeoutError after 10s</text>

  <rect x="420" y="350" width="355" height="90" rx="8" fill="#0d0a1a" stroke="#553c9a" stroke-width="1"/>
  <text x="435" y="370" fill="#b794f4" font-size="11" font-weight="bold">asyncio.Queue — agent message bus</text>
  <text x="435" y="388" fill="#68d391" font-size="10" font-family="Consolas, monospace">q = asyncio.Queue()</text>
  <text x="435" y="404" fill="#90cdf4" font-size="10" font-family="Consolas, monospace">await q.put(task)       # producer</text>
  <text x="435" y="420" fill="#90cdf4" font-size="10" font-family="Consolas, monospace">item = await q.get()    # consumer</text>
</svg>
